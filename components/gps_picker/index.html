<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>GPS Picker</title>
    <script src="https://unpkg.com/streamlit-component-lib@1.4.0/dist/streamlit-component-lib.js"></script>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 8px;
      }
      .box {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px;
      }
      .title {
        font-weight: 600;
        margin-bottom: 6px;
      }
      .coords {
        margin-bottom: 8px;
      }
      button {
        padding: 6px 10px;
        cursor: pointer;
      }
      .status {
        margin-top: 6px;
        font-size: 12px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="title">GPS Coordinates</div>
      <div id="coords" class="coords">Requesting location...</div>
      <button onclick="requestLocation()">Refresh</button>
      <div id="status" class="status"></div>
    </div>

    <script>
      function setStatus(text) {
        document.getElementById("status").innerText = text;
      }

      function setCoords(text) {
        document.getElementById("coords").innerText = text;
      }

      function reportValue(value) {
        if (window.Streamlit) {
          window.Streamlit.setComponentValue(value);
        }
      }

      function requestLocation() {
        if (!navigator.geolocation) {
          setCoords("Geolocation not supported.");
          setStatus("Your browser does not support GPS.");
          reportValue(null);
          return;
        }

        setStatus("Requesting permission...");
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const lat = pos.coords.latitude.toFixed(6);
            const lng = pos.coords.longitude.toFixed(6);
            const coords = lat + ", " + lng;
            setCoords(coords);
            setStatus("Location ready.");
            reportValue(coords);
          },
          () => {
            setCoords("Location unavailable.");
            setStatus("Permission denied or unavailable.");
            reportValue(null);
          },
          { enableHighAccuracy: true, timeout: 8000 }
        );
      }

      requestLocation();
      if (window.Streamlit) {
        window.Streamlit.setFrameHeight(140);
      }
    </script>
  </body>
</html>
